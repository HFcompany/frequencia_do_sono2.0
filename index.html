<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo Meditação</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at bottom, #0b1d3a, #000814);
    overflow: hidden;
    font-family: Arial;
    color: white;
    text-align: center;
}

.container {
    position: relative;
    z-index: 2;
    margin-top: 25vh;
}

button, input, select {
    padding: 12px;
    margin: 10px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    background: #1e3a8a;
    color: white;
}

button:hover {
    background: #2563eb;
}
canvas {
    position: fixed;
    top: 0;
    left: 0;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<div class="container">
    <h1>🌙 Frequência Binaural</h1>
    <p>Use fones para melhor efeito</p>

    <select id="mode">
        <option value="4">🌑 Sono Profundo (4Hz)</option>
        <option value="6">🧘 Meditação (6Hz)</option>
        <option value="8">🌊 Relaxamento (8Hz)</option>
    </select>

    <br>

    <button onclick="iniciar()">Iniciar</button>
    <button onclick="parar()">Parar</button>

    <br>

    🔊 Volume
    <input type="range" id="volume" min="0" max="1" step="0.01" value="0.2">
</div>

<script>
let audioContext;
let oscillatorL;
let oscillatorR;
let gainNode;

function iniciar() {

    if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
    }

    const baseFreq = 200;
    const beatFreq = parseFloat(document.getElementById("mode").value);

    oscillatorL = audioContext.createOscillator();
    oscillatorR = audioContext.createOscillator();

    gainNode = audioContext.createGain();

    oscillatorL.type = "sine";
    oscillatorR.type = "sine";

    oscillatorL.frequency.value = baseFreq;
    oscillatorR.frequency.value = baseFreq + beatFreq;

    const splitter = audioContext.createChannelSplitter(2);
    const merger = audioContext.createChannelMerger(2);

    oscillatorL.connect(gainNode);
    oscillatorR.connect(gainNode);

    gainNode.connect(merger, 0, 0);
    gainNode.connect(merger, 0, 1);

    merger.connect(audioContext.destination);

    gainNode.gain.value = document.getElementById("volume").value;

    oscillatorL.start();
    oscillatorR.start();
}

function parar() {
    if (oscillatorL) oscillatorL.stop();
    if (oscillatorR) oscillatorR.stop();
}

document.getElementById("volume").addEventListener("input", function(){
    if (gainNode) gainNode.gain.value = this.value;
});


// Fundo estrelas animado
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let stars = [];

for (let i = 0; i < 200; i++) {
    stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        radius: Math.random() * 1.5,
        speed: Math.random() * 0.3
    });
}

function drawStars(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";

    stars.forEach(star => {
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.radius, 0, Math.PI*2);
        ctx.fill();

        star.y += star.speed;
        if(star.y > canvas.height){
            star.y = 0;
        }
    });

    requestAnimationFrame(drawStars);
}

drawStars();
</script>

</body>
</html>
